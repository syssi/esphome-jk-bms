substitutions:
  name: heltec-balancer-ek-b24s8e200a
  device_description: "Monitor and control a NEEY EK-B24S8E200A 8A balancer via bluetooth"
  external_components_source: github://syssi/esphome-jk-bms@main
esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jk-bms"
    version: 3.0.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG
  logs:
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret balancer0_mac_address
    id: client0

heltec_balancer_ble:
  - ble_client_id: client0
    throttle: 5s
    id: balancer0

binary_sensor:
  - platform: heltec_balancer_ble
    heltec_balancer_ble_id: balancer0
    balancing:
      name: "balancing"
    online_status:
      name: "online status"

button:
  - platform: heltec_balancer_ble
    heltec_balancer_ble_id: balancer0
    retrieve_settings:
      name: "retrieve settings"
      id: retrieve_settings_button0
    retrieve_device_info:
      name: "retrieve device info"
    retrieve_factory_defaults:
      name: "retrieve factory defaults"

