# Example configuration for 3 JK-BMS v19 systems (JK02_32S protocol) connected via BLE,
# with additional derived entities representing the combined battery stack.
#
# It implements 4 ESPHome devices: one per BMS (JK-BMS[0..2]) and one virtual device (JK-Battery)
# exposing aggregate values such as overall state of charge, combined current and power.
#
# Monitoring 3 BMS units via BLE produces a high entity count that pushes the ESP32 to its limits.
# Using Ethernet instead of Wi-Fi is recommended.

substitutions:
  name: olimex-esp32-poe
  friendly_name: olimex-esp32-poe-JK-BMS
  external_components_source: github://syssi/esphome-jk-bms@main

  bms0_mac_address: A4:C1:38:00:35:0E
  bms0_protocol_version: JK02_32S
  bms0: JK-BMS0

  bms1_mac_address: A4:C1:38:01:B2:C3
  bms1_protocol_version: JK02_32S
  bms1: JK-BMS1

  bms2_mac_address: A4:C1:38:02:7E:90
  bms2_protocol_version: JK02_32S
  bms2: JK-BMS2

esp32:
  board: esp32-poe-iso
  framework:
    type: esp-idf
    advanced:
      # might need additional stack size for such many entities.
      loop_task_stack_size: 32768  # tested: 16384 # 8192 is the default

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"
    - id: device2
      name: "${bms2}"
    - id: battery
      name: JK-Battery

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source: ${external_components_source}
    refresh: 0s

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    mode: CLK_OUT
    pin: 17
  phy_addr: 0
  power_pin:
    number: GPIO12
    ignore_strapping_warning: true

network:
  enable_ipv6: false
  enable_high_performance: true

api:

logger:
  level: INFO
#  logs:
#    esp32_ble_tracker: INFO
#    esp32_ble_client: INFO

ota:
  - platform: esphome
    id: ota_esphome

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1
  - mac_address: ${bms2_mac_address}
    id: client2

jk_bms_ble:
  - ble_client_id: client0
    protocol_version: ${bms0_protocol_version}
    throttle: 5s
    id: bms0
  - ble_client_id: client1
    protocol_version: ${bms1_protocol_version}
    throttle: 5s
    id: bms1
  - ble_client_id: client2
    protocol_version: ${bms2_protocol_version}
    throttle: 5s
    id: bms2

