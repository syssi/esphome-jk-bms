sensor:
# Helper: totals:
  - platform: combination
    device_id: battery
    type: sum
    name: 'Total Current'
    sources:
      - source: bms0_current
      - source: bms1_current
      - source: bms2_current

  - platform: combination
    device_id: battery
    type: mean
    name: 'Total Voltage'
    sources:
      - source: bms0_total_voltage
      - source: bms1_total_voltage
      - source: bms2_total_voltage

  - platform: template
    device_id: battery
    name: 'Total Battery Capacity'
    unit_of_measurement: 'Ah'
    lambda: |-
      if ( id(bms0_total_battery_capacity).state && id(bms1_total_battery_capacity).state && id(bms2_total_battery_capacity).state ) {
        return (
          id(bms0_total_battery_capacity).state
          + id(bms1_total_battery_capacity).state
          + id(bms2_total_battery_capacity).state
        );
      };
      return NAN;
    update_interval: 180s

  - platform: template
    device_id: battery
    name: 'Total State of charge'
    unit_of_measurement: '%'
    accuracy_decimals: 2
    device_class: battery
    state_class: MEASUREMENT
    lambda: |-
      if ( id(bms0_capacity_remaining).state && id(bms0_capacity_remaining).state && id(bms0_capacity_remaining).state
           &&  id(bms0_total_battery_capacity).state && id(bms1_total_battery_capacity).state && id(bms2_total_battery_capacity).state ) {
        return (
          (
            (
              id(bms0_capacity_remaining).state
              + id(bms1_capacity_remaining).state
              + id(bms2_capacity_remaining).state
            )
          / (
              id(bms0_total_battery_capacity).state
              + id(bms1_total_battery_capacity).state
              + id(bms2_total_battery_capacity).state
            )
          )
          * 100.0
        );
      };
      return NAN;
#    update_interval: 20s

  - platform: combination
    device_id: battery
    type: sum
    name: 'Total Capacity Remaining'
    sources:
      - source: bms0_capacity_remaining
      - source: bms1_capacity_remaining
      - source: bms2_capacity_remaining

  - platform: combination
    device_id: battery
    type: sum
    name: 'Total Power'
    sources:
      - source: bms0_power
      - source: bms1_power
      - source: bms2_power

  - platform: combination
    device_id: battery
    type: sum
    name: 'Total Charging Power'
    sources:
      - source: bms0_charging_power
      - source: bms1_charging_power
      - source: bms2_charging_power

  - platform: combination
    device_id: battery
    type: sum
    name: 'Total Discharging Power'
    sources:
      - source: bms0_discharging_power
      - source: bms1_discharging_power
      - source: bms2_discharging_power

# Helper: total_daily_energy
  - platform: total_daily_energy
    id: bms0_total_daily_energy
    device_id: device0
    name: 'Total Daily Energy'
    power_id: bms0_power
    unit_of_measurement: 'kWh'
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    filters:
      # Multiplication factor from W to kW is 0.001
      - multiply: 0.001

  - platform: total_daily_energy
