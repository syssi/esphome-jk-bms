# Description:
# This example file is based on some other good examples from this project and provides a nearly complete configuration for
# a setup of 3 JK-19 BMS systems with additional entities added to represent values for the full stack.
# Overall state of charge, combined current and power, ...
# It is recognizes as 4 Devices (JK-Battery and JK-BMS[0..2])
#
# 3 Batteries via BLE with all those entities is driving the ESP32 to it's limits. Having LAN instead of WIFI for the ESP is recommended.

substitutions:
  name: olimex-esp32-poe
  friendly_name: olimex-esp32-poe-JK-BMS
  external_components_source: github://syssi/esphome-jk-bms@main
  bms0_mac_address: A4:C1:38:00:35:0E
  bms0: JK-BMS0
  bms1_mac_address: A4:C1:38:01:B2:C3
  bms1: JK-BMS1
  bms2_mac_address: A4:C1:38:02:7E:90
  bms2: JK-BMS2

  # Please use "JK02_24S" if you own a old JK-BMS < hardware version 11.0 (hardware version >= 6.0 and < 11.0)
  # Please use "JK02_32S" if you own a new JK-BMS >= hardware version 11.0 (f.e. JK-B2A8S20P hw 11.XW, sw 11.26)
  # Please use "JK04" if you have some old JK-BMS <= hardware version 3.0 (f.e. JK-B2A16S hw 3.0, sw. 3.3.0)
  bms0_protocol_version: JK02_32S
  bms1_protocol_version: JK02_32S
  bms2_protocol_version: JK02_32S

esp32:
  board: esp32-poe-iso
  framework:
    type: esp-idf
    advanced:
      # might need additional stack size for such many entities.
      loop_task_stack_size: 32768 # tested: 16384 # 8192 is the default

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"
    - id: device2
      name: "${bms2}"
    - id: battery
      name: JK-Battery

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source: ${external_components_source}
    refresh: 0s

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    mode: CLK_OUT
    pin: 17
  phy_addr: 0
  power_pin:
    number: GPIO12
    ignore_strapping_warning: true

network:
  enable_ipv6: false
  enable_high_performance: true

api:
  encryption:
    key: BKb06kTH1yt5KQJy6v/IEvdeNi1CG2SDdPYspQeWZeE=  # change this key using the key generator: https://esphome.io/components/api/

logger:
  level: INFO
#  logs:
#    esp32_ble_tracker: INFO
#    esp32_ble_client: INFO

ota:
  - platform: esphome
    id: ota_esphome

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1
  - mac_address: ${bms2_mac_address}
    id: client2

jk_bms_ble:
  - ble_client_id: client0
    protocol_version: ${bms0_protocol_version}
    throttle: 5s
    id: bms0
  - ble_client_id: client1
    protocol_version: ${bms1_protocol_version}
    throttle: 5s
    id: bms1
  - ble_client_id: client2
    protocol_version: ${bms2_protocol_version}
    throttle: 5s
    id: bms2

