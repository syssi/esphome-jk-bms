    jk_bms_id: bms0
    delta_cell_voltage:
      name: "delta cell voltage"
      device_id: device0
    average_cell_voltage:
      name: "average cell voltage"
      device_id: device0
    power_tube_temperature:
      name: "power tube temperature"
      device_id: device0
    total_voltage:
      name: "total voltage"
      device_id: device0
    current:
      name: "current"
      device_id: device0
    power:
      name: "power"
      device_id: device0
    # ...

  - platform: jk_bms
    jk_bms_id: bms1
    delta_cell_voltage:
      name: "delta cell voltage"
      device_id: device1
    average_cell_voltage:
      name: "average cell voltage"
      device_id: device1
    power_tube_temperature:
      name: "power tube temperature"
