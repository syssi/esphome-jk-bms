substitutions:
  name: jk-bms
  bms0: "${name} bms0"
  bms1: "${name} bms1"
  device_description: "Monitor two JK-BMS via UART-TTL"
  external_components_source: github://syssi/esphome-jk-bms@main
  tx_pin_uart_0: GPIO16
  rx_pin_uart_0: GPIO17
  tx_pin_uart_1: GPIO14
  rx_pin_uart_1: GPIO4

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jk-bms"
    version: 2.4.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  - id: uart_0
    baud_rate: 115200
    rx_buffer_size: 384
    tx_pin: ${tx_pin_uart_0}
    rx_pin: ${rx_pin_uart_0}
  - id: uart_1
    baud_rate: 115200
    rx_buffer_size: 384
    tx_pin: ${tx_pin_uart_1}
    rx_pin: ${rx_pin_uart_1}

jk_modbus:
  - id: modbus0
    uart_id: uart_0
  - id: modbus1
    uart_id: uart_1

jk_bms:
  - id: bms0
    jk_modbus_id: modbus0
    update_interval: 5s
  - id: bms1
    jk_modbus_id: modbus1
    update_interval: 5s

binary_sensor:
  - platform: jk_bms
    jk_bms_id: bms0
    balancing:
      name: "balancing"
      device_id: device0
    charging:
      name: "charging"
      device_id: device0
    discharging:
      name: "discharging"
      device_id: device0
    online_status:
      name: "online status"
      device_id: device0
    # ...

  - platform: jk_bms
    jk_bms_id: bms1
    balancing:
      name: "balancing"
      device_id: device1
    charging:
      name: "charging"
      device_id: device1
    discharging:
      name: "discharging"
      device_id: device1
    online_status:
      name: "online status"
      device_id: device1
    # ...

sensor:
