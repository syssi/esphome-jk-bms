substitutions:
  name: heltec-balancer
  balancer0: "${name} device0"
  balancer1: "${name} device1"
  device_description: "Monitor and control a Heltec/NEEY 4A balancer via bluetooth"
  external_components_source: github://syssi/esphome-jk-bms@main
esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jk-bms"
    version: 3.0.0
  devices:
    - id: device0
      name: "${balancer0}"
    - id: device1
      name: "${balancer1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - switch.turn_off: ble_client_switch1
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG
  logs:
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret balancer0_mac_address
    id: client0
  - mac_address: !secret balancer1_mac_address
    id: client1

heltec_balancer_ble:
  - ble_client_id: client0
    throttle: 5s
    id: balancer0
  - ble_client_id: client1
    throttle: 5s
    id: balancer1

binary_sensor:
  - platform: heltec_balancer_ble
    heltec_balancer_ble_id: balancer0
    balancing:
      name: "balancing"
      device_id: device0
    online_status:
      name: "online status"
      device_id: device0

  - platform: heltec_balancer_ble
    heltec_balancer_ble_id: balancer1
    balancing:
      name: "balancing"
      device_id: device1
    online_status:
      name: "online status"
      device_id: device1

button:
  - platform: heltec_balancer_ble
    heltec_balancer_ble_id: balancer0
    retrieve_settings:
      name: "retrieve settings"
      device_id: device0
      id: retrieve_settings_button0
    retrieve_device_info:
